services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mailarchive
      POSTGRES_PASSWORD: mailarchive
      POSTGRES_DB: mailarchive
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailarchive"]
      interval: 2s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 5
