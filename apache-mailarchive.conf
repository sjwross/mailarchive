# Apache configuration for mailarchive
# Add this to your XAMPP httpd-vhosts.conf or include it in httpd.conf
#
# IMPORTANT: This uses a virtual host to isolate mailarchive from other apps.
# It will NOT affect ProjToolbox, blog, academy-clean, or any other apps.

<VirtualHost *:80>
    ServerName mailarchive.local
    DocumentRoot "/Volumes/HubSSD/www/mailarchive/web/dist"

    <Directory "/Volumes/HubSSD/www/mailarchive/web/dist">
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
        
        # Fallback to index.html for SPA routing
        FallbackResource /index.html
    </Directory>

    # Proxy API requests to Node.js API (port 3000)
    # This ONLY applies to requests to http://mailarchive.local/api/*
    # Other apps at http://localhost/* are unaffected
    ProxyPreserveHost On
    ProxyPass /api http://127.0.0.1:3000/api
    ProxyPassReverse /api http://127.0.0.1:3000/api

    # Forward Authorization header (required for JWT authentication)
    # Use the more reliable method that works with mod_proxy
    SetEnvIf Authorization "(.*)" HTTP_AUTHORIZATION=$1
    RequestHeader set Authorization %{HTTP_AUTHORIZATION}e env=HTTP_AUTHORIZATION

    # Logging (optional)
    ErrorLog "/Volumes/HubSSD/www/logs/mailarchive-error.log"
    CustomLog "/Volumes/HubSSD/www/logs/mailarchive-access.log" common
</VirtualHost>
